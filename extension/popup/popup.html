<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>Spectral</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container hidden">
    <header>
      <picture>
        <source media="(prefers-color-scheme: dark)" srcset="banner-wide-dark.png">
        <source media="(prefers-color-scheme: light)" srcset="banner-wide-light.png">
        <img src="banner-wide-dark.png" alt="Spectral" class="header-logo">
      </picture>
      <p class="subtitle">API capture & analysis</p>
    </header>

    <div id="status" class="status status-idle">
      <span class="status-indicator"></span>
      <span class="status-text">Ready to capture</span>
    </div>

    <div id="stats" class="stats hidden">
      <div class="stat">
        <span class="stat-value" id="stat-requests">0</span>
        <span class="stat-label">Requests</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-ws">0</span>
        <span class="stat-label">WebSocket</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-contexts">0</span>
        <span class="stat-label">UI Events</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-duration">0s</span>
        <span class="stat-label">Duration</span>
      </div>
    </div>

    <div class="actions">
<div class="btn-row">
        <button id="btn-start" class="btn btn-primary">
          <span class="btn-icon">&#9210;</span>
          Record
        </button>
        <button id="btn-toggle-settings" class="btn-toggle" aria-expanded="false" title="Capture settings">&#9881;</button>
      </div>
      <div id="capture-settings" class="drawer collapsed">
        <div class="drawer-header">GraphQL interception</div>
        <label class="check-row">
          <input type="checkbox" id="setting-typename" checked>
          <span class="check-row-label">Inject <code>__typename</code></span>
          <a class="check-row-link" href="https://graphql.org/learn/queries/#meta-fields" target="_blank" rel="noopener">docs &#8599;</a>
        </label>
        <label class="check-row">
          <input type="checkbox" id="setting-apq" checked>
          <span class="check-row-label">Block persisted queries</span>
          <a class="check-row-link" href="https://www.apollographql.com/docs/apollo-server/performance/apq/" target="_blank" rel="noopener">docs &#8599;</a>
        </label>
      </div>
      <button id="btn-stop" class="btn btn-danger hidden">
        <span class="btn-icon">&#9209;</span>
        Stop &amp; Send
      </button>
    </div>

<div id="error" class="error hidden"></div>

    <footer>
      <p id="connection-status">Checking connection...</p>
    </footer>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
